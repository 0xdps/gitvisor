name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to GitVisor.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like to see this solved?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (apps/web)
        - API (apps/api)
        - Worker / sync (apps/worker)
        - GitHub integration (packages/github)
        - Self-hosting / Docker
        - Documentation
        - Other
    validations:
      required: true
