services:
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../../../.env.local
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    env_file:
      - ../../../.env.local
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../../.env.local
    depends_on:
      - api

volumes:
  redis_data:
